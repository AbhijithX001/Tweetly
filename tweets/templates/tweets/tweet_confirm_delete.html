{% extends "layout.html" %}
{% block title %}Delete Tweet{% endblock %}

{% block content %}

<h2 class="page-title">Delete Tweet</h2>
<p class="page-subtitle">This action cannot be undone.</p>

<div class="form-shell mb-3">
    <p class="tweet-copy">{{ tweet.text }}</p>
    {% if tweet.photo %}
        <img src="{{ tweet.photo.url }}" class="tweet-image" alt="Tweet image to delete">
    {% endif %}
</div>

<form method="POST" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger">Confirm Delete</button>
    <a href="{% url 'tweet_list' %}" class="btn btn-ghost">Cancel</a>
</form>

{% endblock %}
