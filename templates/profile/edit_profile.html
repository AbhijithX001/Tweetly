{% extends "layout.html" %}
{% load static %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<h2 class="page-title">Edit Profile</h2>
<p class="page-subtitle">Update your avatar and bio.</p>

<form method="POST" enctype="multipart/form-data" class="form-shell">
    {% csrf_token %}

    <label class="form-label fw-semibold">Bio</label>
    <textarea name="bio" rows="4" class="form-control mb-3" placeholder="Tell people about you">{{ profile.bio }}</textarea>

    <label class="form-label fw-semibold">Profile picture</label>
    <input type="file" name="image" class="form-control mb-3" accept="image/png,image/jpeg">

    {% if profile.image %}
        <img src="{{ profile.image.url }}" width="90" height="90" class="avatar mb-3" alt="Current profile photo" onerror="this.src='{% static 'img/default-avatar.png' %}'">
    {% endif %}

    <div class="d-flex gap-2">
        <button class="btn btn-brand px-4">Save</button>
        <a href="{% url 'user_profile' request.user.username %}" class="btn btn-ghost px-4">Cancel</a>
    </div>
</form>

{% endblock %}
