{% extends "layout.html" %}

{% block title %}Login{% endblock %}
{% block content %}

<div class="auth-wrap">
    <div class="form-shell">
        <h2 class="page-title">Welcome Back</h2>
        <p class="page-subtitle">Log in to continue your feed.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-brand w-100 mt-2">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">New here? <a class="inline-link" href="/tweets/register/">Create an account</a></p>
    </div>
</div>

{% endblock %}
